<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的網絡機櫃 - 總目錄</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .title-container { text-align: center; margin-bottom: 20px; }
        #mainTitle { color: #2c3e50; display: inline-block; padding: 5px 15px; border-radius: 8px; margin: 0; transition: 0.3s; }
        .editing #mainTitle { border: 2px dashed #3498db; background-color: #f9fcff; outline: none; cursor: text; }
        .sys-controls { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 8px 16px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; }
        .btn-login { background: #4285F4; color: white; }
        .btn-edit, .btn-save, .btn-add, .btn-backup, .btn-restore { display: none; color: white; }
        .btn-edit { background: #f39c12; } .btn-save { background: #2ecc71; } .btn-add { background: #3498db; }
        .btn-backup { background: #8e44ad; } .btn-restore { background: #d35400; }
        #statusMessage { font-weight: bold; color: #7f8c8d; }
        .category { background: #fdfdfd; border: 2px solid #bdc3c7; border-radius: 8px; margin-bottom: 20px; padding: 15px; transition: 0.3s; }
        .category.dragging { opacity: 0.5; border: 2px dashed #3498db; background: #f0f8ff; }
        .category-header { font-size: 20px; font-weight: bold; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; }
        .link-list { min-height: 50px; padding: 10px; background: #f4f7f6; border-radius: 6px; }
        .link-item { background: #fff; margin-bottom: 10px; padding: 12px 15px; border-radius: 6px; border: 1px solid #ddd; display: flex; align-items: center; transition: 0.2s; }
        .link-item:hover { box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .link-item.dragging { opacity: 0.5; border: 2px dashed #e74c3c; }
        .link-item a { text-decoration: none; color: #2980b9; font-weight: bold; font-size: 16px; flex-grow: 1; outline: none; }
        .editing .category-header span[contenteditable], .editing .link-item a { border-bottom: 1px dashed #3498db; cursor: text; }
        .drag-handle { cursor: grab; font-size: 16px; color: #95a5a6; margin-right: 10px; user-select: none; display: none; }
        .drag-handle:active { cursor: grabbing; }
        .editing .drag-handle { display: inline-block; }
        .btn-add-link { background: #2ecc71; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; display: none; margin-left: auto; }
        .editing .btn-add-link { display: inline-block; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; display: none; margin-left: 10px; }
        .editing .btn-delete { display: inline-block; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="title-container"><h1 id="mainTitle">📚 Knowledge Cabinet</h1></div>
        
        <div class="sys-controls">
            <div>
                <button id="loginBtn" class="btn btn-login">Admin 登入</button>
                <span id="statusMessage" style="margin-left:10px;">系統連線中...</span>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content: flex-end;">
                <button id="backupBtn" class="btn btn-backup">📥 備份</button>
                <button id="restoreBtn" class="btn btn-restore">📤 還原</button>
                <a href="admin-dashboard.html" id="dashboardBtn" class="btn btn-edit" style="background:#34495e; display:none; text-decoration:none;">🗄️ 進入後台</a>
                <input type="file" id="restoreFile" accept=".json" style="display:none;">
                <button id="addCategoryBtn" class="btn btn-add">📁 新增分類</button>
                <button id="editBtn" class="btn btn-edit">⚙️ 管理目錄</button>
                <button id="saveBtn" class="btn btn-save">💾 儲存目錄</button>
            </div>
        </div>
        <div id="indexContent">載入中...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBNEWLMjXK91OWNz_dMNNsz1rS-XYkYoE",
            authDomain: "knowledge-cabinet.firebaseapp.com",
            databaseURL: "https://knowledge-cabinet-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knowledge-cabinet"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = "w.cheung815@gmail.com";

        const loginBtn = document.getElementById('loginBtn');
        const statusMessage = document.getElementById('statusMessage');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const addCategoryBtn = document.getElementById('addCategoryBtn');
        const backupBtn = document.getElementById('backupBtn');
        const restoreBtn = document.getElementById('restoreBtn');
        const restoreFile = document.getElementById('restoreFile');
        const indexContent = document.getElementById('indexContent');
        const mainTitle = document.getElementById('mainTitle');
        const mainContainer = document.getElementById('mainContainer');
        
        let isAdmin = false; let isEditing = false;
        const defaultHTML = `<div class="category"><div class="category-header"><span class="drag-handle">☰</span><span class="cat-title">主要分類</span><button class="btn-add-link">+ 新增文章</button><button class="btn-delete del-cat">刪除</button></div><div class="link-list"></div></div>`;

        // 將讀取資料寫成 Function，方便因應權限變化重新載入
        function loadData() {
            db.ref('main_title').off(); db.ref('index_content').off();
            
            db.ref('main_title').on('value', snap => {
                if (!isEditing && snap.exists()) {
                    mainTitle.innerHTML = snap.val();
                    document.title = mainTitle.innerText.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '').trim() + " - 總目錄";
                }
            }, err => { if(err.code === 'PERMISSION_DENIED') mainTitle.innerHTML = "🔒 私人網絡機櫃"; });

            db.ref('index_content').on('value', snap => {
                if (!isEditing) {
                    indexContent.innerHTML = snap.exists() ? snap.val() : defaultHTML;
                    setupDragAndDrop(); setupButtons();
                }
            }, err => {
                if(err.code === 'PERMISSION_DENIED') {
                    indexContent.innerHTML = "<div style='text-align:center; padding: 40px; color:#7f8c8d; background:#f9f9f9; border-radius:10px;'><h2>🔒 目錄為私人區域</h2><p>只有管理員可以查看。請使用專屬連結閱讀個別文章。</p></div>";
                }
            });
        }

        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                isAdmin = true;
                statusMessage.innerText = `Admin (${user.email})`;
                statusMessage.style.color = "#27ae60";
                loginBtn.innerText = "登出";
                editBtn.style.display = "inline-block";
                document.getElementById('dashboardBtn').style.display = "inline-block";
                backupBtn.style.display = "inline-block";
                restoreBtn.style.display = "inline-block";
            } else {
                isAdmin = false;
                statusMessage.innerText = "訪客 (無權訪問目錄)";
                statusMessage.style.color = "#e74c3c";
                loginBtn.innerText = "Admin 登入";
                disableEditing();
                editBtn.style.display = "none";
                document.getElementById('dashboardBtn').style.display = "none";
                backupBtn.style.display = "none";
                restoreBtn.style.display = "none";
                if(user) auth.signOut();
            }
            loadData(); // 登入或登出都重新載入資料 (觸發權限檢查)
        });

        loginBtn.addEventListener('click', () => {
            if (isAdmin) auth.signOut(); 
            else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => alert(err.message));
        });

        // Backup & Restore
        backupBtn.addEventListener('click', async () => {
            try {
                // 將原來嘅按鈕文字改為提示中
                const originalText = backupBtn.innerText;
                backupBtn.innerText = "⏳ 備份打包中...";
                
                // 逐個合法嘅節點去讀取資料，避開根目錄 (Root) 嘅權限封鎖
                const [pagesSnap, titlesSnap, mainSnap, indexSnap, parentsSnap] = await Promise.all([
                    db.ref('pages').once('value'),
                    db.ref('page_titles').once('value'),
                    db.ref('main_title').once('value'),
                    db.ref('index_content').once('value'),
                    db.ref('page_parents').once('value')
                ]);

                // 重新組裝成一個完整嘅 JSON 物件
                const backupData = {
                    pages: pagesSnap.val(),
                    page_titles: titlesSnap.val(),
                    main_title: mainSnap.val(),
                    index_content: indexSnap.val(),
                    page_parents: parentsSnap.val()
                };

                // 觸發下載
                const blob = new Blob([JSON.stringify(backupData, null, 2)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `cabinet_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                
                // 還原按鈕文字
                backupBtn.innerText = originalText;
            } catch (err) {
                alert("備份失敗（權限或連線問題）：" + err.message);
                backupBtn.innerText = "📥 備份";
            }
        });
        restoreBtn.addEventListener('click', () => { if(confirm("⚠️ 匯入將完全覆蓋目前雲端資料！確定繼續？")) restoreFile.click(); });
        restoreFile.addEventListener('change', (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    db.ref('/').set(JSON.parse(event.target.result)).then(() => alert("✅ 還原成功！")).catch(err => alert("還原失敗：" + err.message));
                } catch(err) { alert("檔案格式錯誤！"); }
            };
            reader.readAsText(file);
        });

        function setupDragAndDrop() { /* (保留原有 Drag & Drop 邏輯，同之前一樣) */
            indexContent.addEventListener('dragover', e => {
                e.preventDefault(); const draggingCat = document.querySelector('.category.dragging');
                if(!draggingCat) return;
                const afterElement = getDragAfterElement(indexContent, e.clientY, '.category:not(.dragging)');
                if (afterElement == null) indexContent.appendChild(draggingCat); else indexContent.insertBefore(draggingCat, afterElement);
            });
            document.querySelectorAll('.link-list').forEach(list => {
                list.addEventListener('dragover', e => {
                    e.preventDefault(); e.stopPropagation();
                    const draggingLink = document.querySelector('.link-item.dragging');
                    if(!draggingLink) return;
                    const afterElement = getDragAfterElement(list, e.clientY, '.link-item:not(.dragging)');
                    if (afterElement == null) list.appendChild(draggingLink); else list.insertBefore(draggingLink, afterElement);
                });
            });
        }
        function getDragAfterElement(container, y, selector) {
            const draggableElements = [...container.querySelectorAll(selector)];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child }; else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function setupButtons() {
            document.querySelectorAll('.drag-handle').forEach(handle => {
                handle.onmousedown = function() { const t = this.closest('.category-header') ? this.closest('.category') : this.closest('.link-item'); if(t) t.setAttribute('draggable', 'true'); };
                handle.onmouseup = function() { const t = this.closest('.category-header') ? this.closest('.category') : this.closest('.link-item'); if(t) t.setAttribute('draggable', 'false'); };
                handle.onmouseleave = function() { const t = this.closest('.category-header') ? this.closest('.category') : this.closest('.link-item'); if(t) t.setAttribute('draggable', 'false'); };
            });
            document.querySelectorAll('.category').forEach(cat => {
                cat.ondragstart = function(e) { if(e.target === cat) cat.classList.add('dragging'); };
                cat.ondragend = function() { cat.classList.remove('dragging'); cat.setAttribute('draggable', 'false'); };
            });
            document.querySelectorAll('.link-item').forEach(item => {
                item.ondragstart = function(e) { if(e.target === item) { item.classList.add('dragging'); e.stopPropagation(); } };
                item.ondragend = function() { item.classList.remove('dragging'); item.setAttribute('draggable', 'false'); };
            });

            document.querySelectorAll('.btn-add-link').forEach(btn => {
                btn.onclick = async function() {
                    const list = this.parentElement.nextElementSibling;
                    async function getValidId() {
                        let customId = prompt("請設定 ID (例如：speech-2026)：", "");
                        if (customId === null) return null;
                        let tempId = customId.trim() !== "" ? customId.trim().toLowerCase().replace(/\s+/g, '-') : 'page_' + Math.random().toString(36).substr(2, 6);
                        const snap = await db.ref('pages/' + tempId).once('value');
                        if (snap.exists()) {
                            if (confirm(`⚠️ 警告：「${tempId}」已存在！\n按【確定】連結至該舊頁面，按【取消】重新設定。`)) return tempId;
                            return await getValidId();
                        } return tempId;
                    }
                    const finalId = await getValidId(); if (!finalId) return;
                    db.ref('page_parents/' + finalId).set('index');
                    const newItem = document.createElement('div'); newItem.className = 'link-item';
                    newItem.innerHTML = `<span class="drag-handle">☰</span> <a href="page.html?id=${finalId}">點此修改新文章標題</a> <button class="btn-delete del-link">X</button>`;
                    list.appendChild(newItem);
                    
                    const newAnchor = newItem.querySelector('a');
                    newAnchor.setAttribute('contenteditable', 'true');
                    newAnchor.onclick = e => e.preventDefault();
                    setupButtons();
                };
            });

            document.querySelectorAll('.del-cat').forEach(btn => { btn.onclick = function() { if(confirm('確定刪除分類及所有文章？')) this.closest('.category').remove(); }; });
            document.querySelectorAll('.del-link').forEach(btn => { btn.onclick = function() { if(confirm('確定移除連結？')) this.closest('.link-item').remove(); }; });
        }

        editBtn.addEventListener('click', () => {
            isEditing = true;
            editBtn.style.display = "none"; backupBtn.style.display = "none"; restoreBtn.style.display = "none";
            saveBtn.style.display = "inline-block"; addCategoryBtn.style.display = "inline-block";
            mainContainer.classList.add('editing');

            mainTitle.setAttribute('contenteditable', 'true');
            document.querySelectorAll('.cat-title').forEach(el => el.setAttribute('contenteditable', 'true'));
            document.querySelectorAll('.link-item a').forEach(el => { el.setAttribute('contenteditable', 'true'); el.onclick = e => e.preventDefault(); });
            setupButtons();
        });

        addCategoryBtn.addEventListener('click', () => {
            const newCat = document.createElement('div'); newCat.className = 'category';
            newCat.innerHTML = `<div class="category-header"><span class="drag-handle">☰</span><span class="cat-title" contenteditable="true">新分類名稱</span><button class="btn-add-link">+ 新增文章</button><button class="btn-delete del-cat">刪除</button></div><div class="link-list"></div>`;
            indexContent.appendChild(newCat); setupDragAndDrop(); setupButtons();
        });

        saveBtn.addEventListener('click', () => {
            disableEditing();
            db.ref('main_title').set(mainTitle.innerHTML);
            db.ref('index_content').set(indexContent.innerHTML).then(() => {
                
                // 【自動同步標題邏輯】掃描所有連結，將目錄嘅標題文字做成子頁面嘅預設標題
                document.querySelectorAll('.link-item a').forEach(a => {
                    const url = new URL(a.href, window.location.href);
                    const pId = url.searchParams.get('id');
                    if (pId) {
                        const linkText = a.innerText.trim();
                        db.ref('page_titles/' + pId).once('value').then(snap => {
                            if(!snap.exists() || snap.val().trim() === "" || snap.val() === "點此修改新文章標題") {
                                db.ref('page_titles/' + pId).set(linkText);
                            }
                        });
                    }
                });
                alert("目錄已成功儲存至雲端！");
            }).catch(err => alert("儲存失敗: " + err.message));
        });

        function disableEditing() {
            isEditing = false; mainContainer.classList.remove('editing');
            addCategoryBtn.style.display = "none"; saveBtn.style.display = "none";
            if (isAdmin) { editBtn.style.display = "inline-block"; backupBtn.style.display = "inline-block"; restoreBtn.style.display = "inline-block"; }
            mainTitle.setAttribute('contenteditable', 'false');
            document.querySelectorAll('.cat-title, .link-item a').forEach(el => el.setAttribute('contenteditable', 'false'));
            document.querySelectorAll('.link-item a').forEach(el => el.onclick = null); 
        }
    </script>
</body>
</html>
