<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章內容 - Knowledge Cabinet</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 麵包屑導航樣式 */
        .breadcrumbs { font-size: 14px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ecf0f1; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; color: #7f8c8d; }
        .breadcrumbs a { color: #3498db; text-decoration: none; font-weight: bold; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; }
        .breadcrumbs a:hover { text-decoration: underline; color: #2980b9; }
        .breadcrumbs span { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; font-weight: bold; color: #2c3e50; }

        .nav-bar { margin-bottom: 20px; display: flex; justify-content: flex-end; align-items: center; }
        .btn-copy-link { background: #1abc9c; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-copy-link:hover { background: #16a085; }

        .title-container { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; }
        #pageMainTitle { color: #2c3e50; display: inline-block; padding: 5px 15px; border-radius: 8px; margin: 0; transition: 0.3s; font-size: 28px; }
        .editing #pageMainTitle { border: 2px dashed #3498db; background-color: #f9fcff; outline: none; cursor: text; min-width: 200px; }

        .sys-controls { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 8px 16px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; }
        .btn-login { background: #4285F4; color: white; }
        .btn-edit { background: #f39c12; color: white; display: none; }
        .btn-save { background: #2ecc71; color: white; display: none; }
        .btn-link { background: #9b59b6; color: white; display: none; }
        .btn-add { background: #3498db; color: white; display: none; } 
        #statusMessage { font-weight: bold; color: #7f8c8d; }

        .box { border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px; overflow: hidden; transition: border-color 0.3s; position: relative; background: #fff; }
        .box.dragging { opacity: 0.5; border: 2px dashed #3498db; }
        .box-header { padding: 15px 20px; background: #fafbfc; cursor: pointer; font-size: 18px; font-weight: bold; position: relative; }
        .box-header::after { content: '▼'; position: absolute; right: 20px; top: 18px; font-size: 12px; color: #95a5a6; transition: 0.3s; }
        .box.active .box-header::after { transform: rotate(180deg); }
        .box-content { display: none; padding: 20px; border-top: 1px solid #ecf0f1; }
        .box.active .box-content { display: block; }
        .editing .box-header, .editing .box-content { border: 2px dashed #3498db; background-color: #f9fcff; outline: none; cursor: text; }
        .editing .box-header::after { display: none; }
        .editing .box-content { display: block; }
        .box-content a { color: #e74c3c; font-weight: bold; text-decoration: underline; cursor: pointer; background: #fdf2f1; padding: 2px 6px; border-radius: 4px; }

        .box-toolbar { background: #e8f4f8; padding: 6px 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #d4eaf2; align-items: center; }
        .drag-handle { cursor: grab; font-size: 16px; color: #34495e; font-weight: bold; padding: 0 10px; user-select: none; }
        .drag-handle:active { cursor: grabbing; }
        .btn-delete-box { background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-delete-box:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        
        <!-- 動態麵包屑導航 -->
        <div class="breadcrumbs" id="breadcrumbsContainer">
            載入導航路徑中...
        </div>

        <div class="nav-bar">
            <button id="copyShareBtn" class="btn-copy-link">🔗 複製此頁連結</button>
        </div>

        <div class="sys-controls">
            <div>
                <button id="loginBtn" class="btn btn-login">Admin 登入</button>
                <span id="statusMessage" style="margin-left:10px;">閱讀者 (唯讀)</span>
            </div>
            <div>
                <button id="addBoxBtn" class="btn btn-add">➕ 新增區塊</button>
                <button id="createLinkBtn" class="btn btn-link" title="反白文字後點擊">🔗 變為子頁面</button>
                <button id="editBtn" class="btn btn-edit">✏️ 編輯內容</button>
                <button id="saveBtn" class="btn btn-save">💾 儲存</button>
            </div>
        </div>
        
        <div class="title-container">
            <h1 id="pageMainTitle" style="display:none;"></h1>
        </div>

        <div id="cabinetContent">載入中...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBNEWLMjXK91OWNz_dMNNsz1rS-XYkYoE",
            authDomain: "knowledge-cabinet.firebaseapp.com",
            databaseURL: "https://knowledge-cabinet-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knowledge-cabinet"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = "w.cheung815@gmail.com";

        const urlParams = new URLSearchParams(window.location.search);
        let pageId = urlParams.get('id');
        if(!pageId) { window.location.href = 'index.html'; }

        const loginBtn = document.getElementById('loginBtn');
        const statusMessage = document.getElementById('statusMessage');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const createLinkBtn = document.getElementById('createLinkBtn');
        const addBoxBtn = document.getElementById('addBoxBtn');
        const copyShareBtn = document.getElementById('copyShareBtn');
        const cabinetContent = document.getElementById('cabinetContent');
        const pageMainTitle = document.getElementById('pageMainTitle');
        const mainContainer = document.getElementById('mainContainer');
        const breadcrumbsContainer = document.getElementById('breadcrumbsContainer');
        
        let isAdmin = false; let isEditing = false;

        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                isAdmin = true;
                statusMessage.innerText = `Admin (${user.email})`;
                statusMessage.style.color = "#27ae60";
                loginBtn.innerText = "登出";
                editBtn.style.display = "inline-block";
            } else {
                isAdmin = false;
                statusMessage.innerText = "閱讀者 (唯讀)";
                statusMessage.style.color = "#7f8c8d";
                loginBtn.innerText = "Admin 登入";
                disableEditing();
                editBtn.style.display = "none";
                if(user) auth.signOut();
            }
        });

        loginBtn.addEventListener('click', () => {
            if (isAdmin) auth.signOut(); 
            else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => alert(err.message));
        });

        // 構建麵包屑導航 (遞迴追溯)
        async function buildBreadcrumbs(currentId) {
            let pathChain = [];
            let current = currentId;
            
            // 向上追溯到 index 或者盡頭
            while(current && current !== 'index') {
                pathChain.unshift(current);
                const snap = await db.ref('page_parents/' + current).once('value');
                current = snap.val(); // 取得上一層 ID
            }
            
            // 獲取總目錄標題
            const indexSnap = await db.ref('main_title').once('value');
            const mainTitleText = indexSnap.exists() ? indexSnap.val() : "總目錄";
            
            let html = `<a href="index.html" title="${mainTitleText}">${mainTitleText}</a>`;
            
            // 獲取所有祖先層級嘅標題
            for (let i = 0; i < pathChain.length; i++) {
                const id = pathChain[i];
                const tSnap = await db.ref('page_titles/' + id).once('value');
                const titleText = tSnap.exists() ? tSnap.val() : "未命名頁面";
                
                html += ` &nbsp;❯&nbsp; `;
                if (i === pathChain.length - 1) {
                    // 最後一個係目前頁面，唔可以 click
                    html += `<span title="${titleText}">${titleText}</span>`;
                } else {
                    html += `<a href="page.html?id=${id}" title="${titleText}">${titleText}</a>`;
                }
            }
            breadcrumbsContainer.innerHTML = html;
        }

        buildBreadcrumbs(pageId); // 執行構建

        db.ref('page_titles/' + pageId).on('value', snap => {
            if (!isEditing) {
                if(snap.exists() && snap.val().trim() !== "") {
                    pageMainTitle.innerHTML = snap.val();
                    pageMainTitle.style.display = "inline-block";
                    document.title = pageMainTitle.innerText.trim() + " - Knowledge Cabinet";
                    // 標題更新時，重刷麵包屑
                    buildBreadcrumbs(pageId); 
                } else {
                    pageMainTitle.style.display = "none";
                    document.title = "文章內容 - Knowledge Cabinet";
                }
            }
        });

        db.ref('pages/' + pageId).on('value', snap => {
            if (!isEditing) {
                if(snap.exists()) cabinetContent.innerHTML = snap.val();
                else cabinetContent.innerHTML = `<div class="box active"><div class="box-header">新主題</div><div class="box-content"><p>請切換至 Admin 並編輯內容。</p></div></div>`;
                setupAccordion(); setupDragAndDrop();
            }
        });

        copyShareBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const originalText = copyShareBtn.innerText;
                copyShareBtn.innerText = "✅ 連結已複製！";
                copyShareBtn.style.background = "#27ae60";
                setTimeout(() => { copyShareBtn.innerText = originalText; copyShareBtn.style.background = "#1abc9c"; }, 3000);
            }).catch(() => alert("複製失敗，請手動複製網址列。"));
        });

        function setupAccordion() {
            document.querySelectorAll('.box-header').forEach(header => {
                const newHeader = header.cloneNode(true);
                header.parentNode.replaceChild(newHeader, header);
                newHeader.addEventListener('click', function() {
                    if(isEditing) return; 
                    this.parentElement.classList.toggle('active');
                });
            });
        }

        function setupDragAndDrop() {
            cabinetContent.addEventListener('dragover', e => {
                e.preventDefault(); const draggingBox = document.querySelector('.dragging');
                if(!draggingBox) return;
                const afterElement = getDragAfterElement(cabinetContent, e.clientY);
                if (afterElement == null) cabinetContent.appendChild(draggingBox); else cabinetContent.insertBefore(draggingBox, afterElement);
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.box:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child }; else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function addToolbarToBox(box) {
            if (!box.querySelector('.box-toolbar')) {
                const toolbar = document.createElement('div'); toolbar.className = 'box-toolbar'; toolbar.setAttribute('contenteditable', 'false');
                const dragHandle = document.createElement('span'); dragHandle.className = 'drag-handle'; dragHandle.innerHTML = '☰ 移動';
                
                dragHandle.addEventListener('mousedown', () => box.setAttribute('draggable', 'true'));
                dragHandle.addEventListener('mouseup', () => box.setAttribute('draggable', 'false'));
                dragHandle.addEventListener('mouseleave', () => box.setAttribute('draggable', 'false'));

                box.addEventListener('dragstart', () => box.classList.add('dragging'));
                box.addEventListener('dragend', () => { box.classList.remove('dragging'); box.setAttribute('draggable', 'false'); });

                const delBtn = document.createElement('button'); delBtn.className = 'btn-delete-box'; delBtn.innerHTML = '🗑️ 刪除';
                delBtn.onclick = function() { if(confirm('確定要刪除？')) box.remove(); };
                toolbar.appendChild(dragHandle); toolbar.appendChild(delBtn); box.insertBefore(toolbar, box.firstChild);
            }
        }

        editBtn.addEventListener('click', () => {
            isEditing = true;
            editBtn.style.display = "none"; saveBtn.style.display = "inline-block";
            createLinkBtn.style.display = "inline-block"; addBoxBtn.style.display = "inline-block";
            mainContainer.classList.add('editing');

            pageMainTitle.style.display = "inline-block";
            if (pageMainTitle.innerText.trim() === "") pageMainTitle.innerHTML = "請輸入文章總標題";
            pageMainTitle.setAttribute('contenteditable', 'true');

            document.querySelectorAll('.box-header, .box-content').forEach(el => {
                el.setAttribute('contenteditable', 'true');
                if(el.classList.contains('box-header')) el.style.display = "block";
            });
            document.querySelectorAll('.box').forEach(box => addToolbarToBox(box));
        });

        addBoxBtn.addEventListener('click', () => {
            const newBox = document.createElement('div'); newBox.className = 'box active';
            newBox.innerHTML = `<div class="box-header" contenteditable="true">新標題</div><div class="box-content" contenteditable="true"><p>請輸入內容...</p></div>`;
            cabinetContent.appendChild(newBox); addToolbarToBox(newBox);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        createLinkBtn.addEventListener('click', async () => {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.toString().trim() === '') return alert('請先反白選取文字！');
            const range = selection.getRangeAt(0);
            
            async function getValidId() {
                let customId = prompt("請設定專屬 ID (例如：ai-part2)。\n留空將自動生成帶有 Prefix 嘅 ID：", "");
                if (customId === null) return null;
                
                // 自動帶入目前 pageId 作為 Prefix
                let tempId = customId.trim() !== "" 
                    ? customId.trim().toLowerCase().replace(/\s+/g, '-') 
                    : pageId + '_' + Math.random().toString(36).substr(2, 6);
                
                const snap = await db.ref('pages/' + tempId).once('value');
                if (snap.exists()) {
                    if (confirm(`⚠️ 警告：「${tempId}」已存在！\n按【確定】連結至該舊頁面。\n按【取消】重新設定。`)) return tempId;
                    return await getValidId();
                }
                return tempId;
            }

            const finalId = await getValidId(); if (!finalId) return;

            // 紀錄父層級關係 (非常重要，麵包屑全靠佢)
            db.ref('page_parents/' + finalId).set(pageId);

            const selectedText = selection.toString().trim();
            if(selectedText !== "") db.ref('page_titles/' + finalId).set(selectedText);

            selection.removeAllRanges(); selection.addRange(range);
            document.execCommand('createLink', false, `page.html?id=${finalId}`);
            alert(`成功！連結已指向 ID: ${finalId}`);
        });

        saveBtn.addEventListener('click', () => {
            disableEditing();
            document.querySelectorAll('.box').forEach(box => {
                const header = box.querySelector('.box-header');
                if(header.innerText.trim() === "") { header.style.display = "none"; box.classList.add('active'); } 
                else { header.style.display = "block"; }
            });
            
            const titleText = pageMainTitle.innerText.trim() === "請輸入文章總標題" ? "" : pageMainTitle.innerHTML;
            db.ref('page_titles/' + pageId).set(titleText);
            db.ref('pages/' + pageId).set(cabinetContent.innerHTML).then(() => {
                alert("內容已成功儲存至雲端！");
                buildBreadcrumbs(pageId); // 儲存後重刷麵包屑
            }).catch(err => alert("儲存失敗: " + err.message));
            setupAccordion();
        });

        function disableEditing() {
            isEditing = false; mainContainer.classList.remove('editing');
            createLinkBtn.style.display = "none"; addBoxBtn.style.display = "none";
            document.querySelectorAll('.box-toolbar').forEach(t => t.remove());
            
            pageMainTitle.setAttribute('contenteditable', 'false');
            if (pageMainTitle.innerText.trim() === "" || pageMainTitle.innerText.trim() === "請輸入文章總標題") {
                pageMainTitle.style.display = "none";
            }

            document.querySelectorAll('.box-header, .box-content').forEach(el => el.setAttribute('contenteditable', 'false'));
            if (isAdmin) editBtn.style.display = "inline-block";
            saveBtn.style.display = "none";
        }
    </script>
</body>
</html>
