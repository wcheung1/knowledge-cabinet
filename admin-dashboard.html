<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機櫃後台總覽 - Knowledge Cabinet</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #2c3e50; padding: 20px; color: #fff; }
        .container { max-width: 1000px; margin: 0 auto; background: #34495e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #ecf0f1; border-bottom: 2px solid #7f8c8d; padding-bottom: 15px; }
        .nav-bar { margin-bottom: 20px; }
        .nav-bar a { color: #3498db; text-decoration: none; font-weight: bold; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #ecf0f1; color: #2c3e50; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #bdc3c7; }
        th { background-color: #bdc3c7; font-weight: bold; }
        tr:hover { background-color: #d4eaf2; }
        
        .btn-small { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 5px; }
        .btn-open { background: #3498db; color: white; text-decoration: none; }
        .btn-copy { background: #1abc9c; color: white; }
        .btn-del { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html">← 返回總目錄</a>
        </div>
        <h1>⚙️ 機櫃資料庫總覽 (Admin Dashboard)</h1>
        <p id="loadingMsg">檢查權限及載入資料中...</p>
        
        <table id="pagesTable" style="display:none;">
            <thead>
                <tr>
                    <th>Page ID</th>
                    <th>頁面總標題</th>
                    <th>父層級 (來源)</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBNEWLMjXK91OWNz_dMNNsz1rS-XYkYoE",
            authDomain: "knowledge-cabinet.firebaseapp.com",
            databaseURL: "https://knowledge-cabinet-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knowledge-cabinet"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = "w.cheung815@gmail.com";

        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                loadDashboardData();
            } else {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px; color:#e74c3c;'>🔒 權限不足，請從總目錄以 Admin 身份登入。</h2>";
            }
        });

        function loadDashboardData() {
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('pagesTable').style.display = 'table';
            const tbody = document.getElementById('tableBody');

            // 同時讀取 pages, titles, 同 parents
            Promise.all([
                db.ref('pages').once('value'),
                db.ref('page_titles').once('value'),
                db.ref('page_parents').once('value')
            ]).then(snapshots => {
                const pages = snapshots[0].val() || {};
                const titles = snapshots[1].val() || {};
                const parents = snapshots[2].val() || {};
                
                tbody.innerHTML = '';
                for (let id in pages) {
                    const title = titles[id] || '<span style="color:#7f8c8d;font-style:italic;">(未設定標題)</span>';
                    const parent = parents[id] === 'index' ? '總目錄' : (parents[id] || '無 / 孤立');
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${id}</strong></td>
                        <td>${title}</td>
                        <td><span style="background:#bdc3c7; padding:2px 6px; border-radius:4px; font-size:12px;">${parent}</span></td>
                        <td>
                            <a href="page.html?id=${id}" target="_blank" class="btn-small btn-open">👁️ 開啟</a>
                            <button class="btn-small btn-copy" onclick="copyLink('${id}')">🔗 複製</button>
                            <button class="btn-small btn-del" onclick="deletePage('${id}')">🗑️ 刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }

        function copyLink(id) {
            const url = window.location.origin + window.location.pathname.replace('admin-dashboard.html', '') + 'page.html?id=' + id;
            navigator.clipboard.writeText(url).then(() => alert('已複製連結！'));
        }

        function deletePage(id) {
            if(confirm(`⚠️ 極度危險：確定要徹底刪除 Page ID [${id}] 嗎？\n刪除後無法復原！`)) {
                db.ref('pages/' + id).remove();
                db.ref('page_titles/' + id).remove();
                db.ref('page_parents/' + id).remove();
                alert('頁面已刪除！');
                loadDashboardData(); // 重新整理表格
            }
        }
    </script>
</body>
</html>
